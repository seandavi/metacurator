id: https://w3id.org/metacurator/cmd
name: cmd
title: curatedMetagenomicData sample schema (starter)
description: >-
  The first concrete metacurator curation schema, modeling a curatedMetagenomicData
  per-sample record. STARTER / ILLUSTRATIVE: a representative subset of slots is written
  by hand to demonstrate the patterns (ontology-bound enums via `meaning`, a dynamic
  `reachable_from` enum, accession + numeric fields). The full schema should be generated
  from the cMD data dictionary CSV (the `*_ontology_term_id` columns become enum
  `meaning`s) — see SPEC 060 and the `dict_to_linkml` tool noted there.
license: MIT
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  cmd: https://w3id.org/metacurator/cmd/
  metacurator: https://w3id.org/metacurator/
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_

default_prefix: cmd
imports:
  - linkml:types
  - metacurator_core

classes:
  Sample:
    is_a: CuratedRecord
    description: One curatedMetagenomicData sample (one row of a *_sample.tsv).
    slots:
      - study_name
      - sample_id
      - subject_id
      - ncbi_accession
      - body_site
      - disease
      - target_condition
      - sex
      - country
      - age
      - age_unit
      - age_min
      - age_max
      - age_group
      - bmi
      - ancestry
      - westernized
      - antibiotics_current_use
      - sequencing_platform
      - host_species
    slot_usage:
      sample_id:
        identifier: true

slots:
  study_name:
    required: true
  sample_id:
    description: Sample identifier (often the BioSample accession in cMD).
    required: true
  subject_id:
    required: true
  ncbi_accession:
    description: >-
      Sequence-archive run accession(s) (SRR/ERR/DRR). Produced by `archive` (SPEC 030),
      never by a model. May be multivalued.
    multivalued: true
  body_site:
    description: Anatomical site of the sample; bound to UBERON.
    range: BodySiteEnum
  disease:
    description: >-
      Disease/condition. Dynamic enum: any NCIT term under the Disease/Disorder branch.
      Validated by grounding (SPEC 070) against the configured ontology backend.
    range: DiseaseEnum
  target_condition:
    description: >-
      The study's target condition (the phenotype it was designed to study). Deliberately a
      free string, NOT an ontology-bound enum: a corpus audit showed cMD target_condition
      values span multiple ontologies and concept kinds — NCIT disease/finding, NCIT
      microbiome concepts ("Microbiome", "Intestinal Flora"), OHMI host-microbiome
      interactions, and NCBITaxon organisms ("Prevotella copri") — so no single branch fits.
  sex:
    range: SexEnum
  country:
    description: Country of origin; bound to NCIT geographic terms.
    range: CountryEnum
  age:
    description: Age value (numeric).
    range: float
  age_unit:
    range: AgeUnitEnum
  age_min:
    description: Lower bound of an age range (numeric).
    range: float
  age_max:
    description: Upper bound of an age range (numeric).
    range: float
  age_group:
    description: Age group; bound to the NCIT age-related-group branch.
    range: AgeGroupEnum
  bmi:
    description: Body mass index (numeric).
    range: float
  ancestry:
    description: Genetic ancestry; bound to HANCESTRO.
    range: AncestryEnum
  westernized:
    range: YesNoEnum
  antibiotics_current_use:
    description: Whether the subject is currently using antibiotics.
    range: YesNoEnum
  sequencing_platform:
    range: SequencingPlatformEnum
  host_species:
    range: HostSpeciesEnum

enums:
  BodySiteEnum:
    description: >-
      Body site, bound to UBERON. A dynamic enum — any UBERON anatomical entity is
      permissible; grounding (SPEC 070) verifies each value against UBERON rather than a
      hand-maintained list (ADR-0004).
    include:
      - reachable_from:
          source_ontology: obo:uberon
          source_nodes:
            # "anatomical entity" — VERIFIED against UBERON: the root that covers anatomical
            # structures (vagina, epidermis), spaces (oral/nasal cavity), and organism
            # substances (feces, milk) — i.e. every cMD body_site value.
            - UBERON:0001062
          relationship_types:
            - rdfs:subClassOf
          is_direct: false

  DiseaseEnum:
    description: >-
      Any disease in the NCIT Disease, Disorder or Finding branch. A dynamic enum — the
      permissible set is defined by ontology reachability, not enumerated here. The
      grounding backend (SPEC 070) checks membership via a recursive-CTE closure over
      `edges`. `Healthy` is included explicitly as the cMD convention for no disease.
    include:
      - reachable_from:
          source_ontology: obo:ncit
          source_nodes:
            # "Disease, Disorder or Finding" — VERIFIED against NCIT: this is the root that
            # covers both C2991 (Disease or Disorder; carcinomas, T2D, …) and C3367
            # (Finding; hypertension, diarrhea, preterm birth, …). C2991 alone was too
            # narrow — confirmed by a grounding audit over the cMD corpus.
            - NCIT:C7057
          relationship_types:
            - rdfs:subClassOf
          is_direct: false
    permissible_values:
      # 'Healthy' stays an explicit permissible value (NOT reached via the branch above)
      # because NCIT correctly does not place "healthy" under Disease/Disorder/Finding —
      # it is the *absence* of disease, modeled as NCIT:C115935 "Healthy" whose parent is
      # C27992 "Disease Qualifier". So it cannot be subsumed by reachability; the explicit
      # binding is the right representation and is still ontology-grounded (not free text).
      Healthy:
        meaning: NCIT:C115935

  CountryEnum:
    description: >-
      Country of origin, bound to NCIT. A dynamic enum — any NCIT country is permissible;
      grounding (SPEC 070) verifies each value against NCIT rather than a hand-typed list
      (ADR-0004), so no unverified CURIEs are shipped in the schema.
    include:
      - reachable_from:
          source_ontology: obo:ncit
          source_nodes:
            # "Country" — VERIFIED against NCIT: the direct parent of every country term
            # (United States C17234, China C16428, …).
            - NCIT:C25464
          relationship_types:
            - rdfs:subClassOf
          is_direct: false

  AgeUnitEnum:
    description: >-
      Age unit. No `meaning`s asserted — cMD's age_unit has no ontology term id column, so
      binding CURIEs here would be unverified (ADR-0004).
    permissible_values:
      Year:
      Month:
      Day:

  HostSpeciesEnum:
    permissible_values:
      Homo sapiens:
        meaning: NCBITaxon:9606

  AgeGroupEnum:
    description: >-
      Age group, bound to NCIT. A STATIC enum with verified meanings (not dynamic): an audit
      showed the cMD labels (e.g. "Adult") collide with generic NCIT terms — "Adult" is the
      primary label of NCIT:C17600 but cMD curates the age-group-specific NCIT:C49685 (which
      carries "Adult" as a synonym), so reachability grounding picks the wrong term. The
      meanings below are the curator's choices, VERIFIED against NCIT (each is under
      NCIT:C20587 "Age Related Group").
    permissible_values:
      Newborn:
        meaning: NCIT:C16731
      Infant:
        meaning: NCIT:C27956
      Child:
        meaning: NCIT:C49683
      Adolescent:
        meaning: NCIT:C27954
      Adult:
        meaning: NCIT:C49685
      Elderly:
        meaning: NCIT:C16268

  AncestryEnum:
    description: >-
      Genetic ancestry — dynamic enum over the HANCESTRO "ancestry category" branch. Root
      VERIFIED against HANCESTRO (covers European, African, Asian, Hispanic/Latin American,
      …). HANCESTRO is available from semantic-sql, like NCIT/UBERON.
    include:
      - reachable_from:
          source_ontology: obo:hancestro
          source_nodes:
            - HANCESTRO:0004
          relationship_types:
            - rdfs:subClassOf
          is_direct: false

  SequencingPlatformEnum:
    description: >-
      Sequencing platform. No `meaning`s asserted — cMD's sequencing_platform has no
      ontology term id column, so binding CURIEs here would be unverified (ADR-0004).
    permissible_values:
      IlluminaHiSeq:
      IlluminaNovaSeq:
      IlluminaNextSeq:
      IlluminaMiSeq:
      IonProton:
      BGISeq:
